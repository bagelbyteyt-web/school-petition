name: Append signature to names.txt

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  append-signature:
    if: contains(github.event.issue.labels.*.name, 'signature')
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Extract name and grade, append to names.txt
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          # Issue Forms render each field as "### Label" followed by the answer on the next line.
          NAME=$(echo "$ISSUE_BODY" | awk '/^### Full name/{getline; print; exit}')
          GRADE=$(echo "$ISSUE_BODY" | awk '/^### Grade/{getline; print; exit}')

          NAME=$(echo "$NAME" | sed 's/^ *//;s/ *$//')
          GRADE=$(echo "$GRADE" | sed 's/^ *//;s/ *$//')

          if [ -z "$NAME" ] || [ -z "$GRADE" ]; then
            echo "Could not parse name/grade from issue body, skipping."
            exit 0
          fi

          touch names.txt
          echo "$NAME — $GRADE" >> names.txt

      - name: Commit and push names.txt
        run: |
          git config user.name "petition-bot"
          git config user.email "actions@github.com"
          git add names.txt
          git diff --staged --quiet || git commit -m "Add signature from issue #${{ github.event.issue.number }}"
          git push

      - name: Close the issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              state: 'closed'
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: "✅ You're signed! Added to `names.txt`."
            });
